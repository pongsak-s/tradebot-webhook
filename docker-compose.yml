version: '3.8'
services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-trading}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
  webhook:
    build:
      context: ./apps/webhook
      dockerfile: Dockerfile
    env_file:
      - apps/webhook/.env
    depends_on:
      - postgres
    ports:
      - '${WEBHOOK_PORT:-3000}:3000'
  executor:
    build:
      context: ./apps/executor
      dockerfile: Dockerfile
    env_file:
      - apps/executor/.env
    depends_on:
      - postgres
    ports:
      - '${EXECUTOR_PORT:-3001}:3001'
  ui:
    build:
      context: ./apps/ui
      dockerfile: Dockerfile
    env_file:
      - apps/ui/.env
    ports:
      - '${UI_PORT:-3002}:3002'
volumes:
  postgres_data:
    driver: local